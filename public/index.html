<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Future Energy Heating - Android 앱 다운로드</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1e3a5f 0%, #0f2744 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 48px 36px;
      text-align: center;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .logo {
      font-size: 56px;
      margin-bottom: 16px;
    }
    .app-name {
      font-size: 22px;
      font-weight: 800;
      color: #1a202c;
      margin-bottom: 6px;
    }
    .app-sub {
      font-size: 14px;
      color: #718096;
      margin-bottom: 32px;
    }
    .badge-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }
    .badge {
      background: #edf2f7;
      color: #4a5568;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 20px;
    }
    .badge.blue { background: #ebf8ff; color: #2b6cb0; }
    .badge.green { background: #f0fff4; color: #276749; }
    .download-btn {
      display: block;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: white;
      text-decoration: none;
      padding: 18px 28px;
      border-radius: 16px;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
      transition: transform 0.1s, box-shadow 0.1s;
      box-shadow: 0 4px 16px rgba(37,99,235,0.4);
    }
    .download-btn:active { transform: scale(0.98); }
    .download-btn span { display: block; font-size: 12px; font-weight: 400; opacity: 0.85; margin-top: 4px; }
    .steps {
      text-align: left;
      background: #f7fafc;
      border-radius: 12px;
      padding: 20px;
      margin-top: 24px;
    }
    .steps-title {
      font-size: 13px;
      font-weight: 700;
      color: #4a5568;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .step {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 13px;
      color: #4a5568;
      line-height: 1.5;
    }
    .step-num {
      background: #2563eb;
      color: white;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .version-info {
      margin-top: 20px;
      font-size: 11px;
      color: #a0aec0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🔥</div>
    <div class="app-name">Future Energy Heating</div>
    <div class="app-sub">미래에너지테크 난방 관리 앱</div>

    <div class="badge-row">
      <span class="badge blue">Android</span>
      <span class="badge green">v1.0.0</span>
      <span class="badge">약 50 MB</span>
    </div>

    <a class="download-btn" href="/future-energy-heating.apk" download="future-energy-heating.apk">
      📥 APK 다운로드
      <span>future-energy-heating.apk</span>
    </a>

    <div class="steps">
      <div class="steps-title">설치 방법</div>
      <div class="step">
        <div class="step-num">1</div>
        <div>위 버튼을 눌러 APK 파일을 다운로드하세요</div>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <div>설정 → 보안 → <strong>출처를 알 수 없는 앱 허용</strong>을 활성화하세요</div>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <div>다운로드된 APK 파일을 탭하여 설치하세요</div>
      </div>
      <div class="step">
        <div class="step-num">4</div>
        <div>앱 실행 후 관리자에게 받은 계정으로 로그인하세요</div>
      </div>
    </div>

    <div class="version-info">
      버전 1.0.0 · 2026-06-23 빌드<br>
      © 미래에너지테크
    </div>
  </div>
</body>
</html>
